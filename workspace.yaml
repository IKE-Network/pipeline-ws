# workspace.yaml — Pipeline Workspace Manifest
# ══════════════════════════════════════════════
#
# Build infrastructure workspace: Maven plugin tooling, documentation
# pipeline, and IKE Lab document projects. Use this workspace when
# iterating across build tooling and the projects that consume it.
#
# Convention: workspace repos use the `-ws` suffix.
# See IKE-MAVEN.md naming conventions for the full standard.

schema-version: "1.0"
generated: 2026-03-22

defaults:
  branch: main
  maven-version: "4.0.0-rc-5"

component-types:
  infrastructure:
    description: "Build tooling, parent POMs, shared resources"
    build-command: "mvn clean install"
    checkpoint-mechanism: git-tag
  document:
    description: "AsciiDoc topic libraries and assemblies"
    build-command: "mvn clean verify"
    checkpoint-mechanism: git-tag

components:

  ike-tooling:
    type: infrastructure
    description: >
      Maven plugin (ike-maven-plugin) and workspace model library.
      Release, workspace, gitflow, and build-utility goals.
    repo: https://github.com/kec/ike-tooling.git
    branch: main
    version: 21-SNAPSHOT
    groupId: network.ike
    depends-on: []

  ike-pipeline:
    type: infrastructure
    description: >
      Documentation pipeline: AsciiDoc renderers, doc resources,
      build standards, BOM, ike-parent. Uses ike-maven-plugin
      from ike-tooling as a build plugin.
    repo: https://github.com/kec/ike-pipeline.git
    branch: main
    version: 28-SNAPSHOT
    groupId: network.ike
    depends-on:
      - component: ike-tooling
        relationship: tool-time

  ike-lab-documents:
    type: document
    description: >
      IKE Lab topic library and assembly documents (~300 topics).
    repo: https://github.com/kec/ike-lab-documents.git
    branch: main
    version: ~
    groupId: network.ike
    depends-on:
      - component: ike-pipeline
        relationship: build

groups:
  tooling: [ike-tooling, ike-pipeline]
  docs: [ike-lab-documents]
  all: [tooling, docs]
