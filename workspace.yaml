# workspace.yaml — Pipeline Workspace Manifest
# ══════════════════════════════════════════════
#
# Build infrastructure workspace: Maven plugin tooling, documentation
# pipeline, and IKE Lab document projects. Use this workspace when
# iterating across build tooling and the projects that consume it.
#
# Convention: workspace repos use the `-ws` suffix.
# See IKE-MAVEN.md naming conventions for the full standard.

schema-version: "1.0"
generated: 2026-03-22

defaults:
  branch: main
  maven-version: "4.0.0-rc-5"

subprojects:

  # ike-tooling is intentionally NOT a workspace subproject.
  # It is the bootstrap project — the source of ike-maven-plugin,
  # which every other subproject uses at build time. Its own release
  # procedure relies on ike:release-publish from the plugin it
  # produces (self-bootstrap), so no external orchestrator can
  # release it without first installing that SNAPSHOT locally.
  # Treating ike-tooling as a workspace release target creates a
  # chicken-and-egg that can't be resolved from outside its reactor.
  # Release ike-tooling manually from ike-tooling/ using its own
  # ike:release-publish goal; downstream workspaces pick up the
  # new tag via their ike-tooling.version property.

  # ike-pipeline was split into ike-docs + ike-platform + example repos
  # (see IKE-Network/ike-issues#216) and archived. Downstream consumers
  # now depend on ike-docs/ike-platform/ike-tooling as external-consumer
  # released artifacts; this workspace does not orchestrate their
  # development. See ike-issues#233 for the alignment-model design.

  ike-lab-documents:
    type: document
    description: >
      IKE Lab topic library and assembly documents (~300 topics).
    repo: https://github.com/kec/ike-lab-documents.git
    branch: main
    version: ~
    groupId: network.ike
    depends-on: []

